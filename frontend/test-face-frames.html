<!DOCTYPE html>
<html>
<head>
    <title>Face Frame Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-container { margin: 20px 0; }
        .frame-test { border: 1px solid #ccc; margin: 10px 0; }
        img { max-width: 200px; height: auto; }
    </style>
</head>
<body>
    <h1>Face Frame Loading Test</h1>
    
    <div class="test-container">
        <h2>Test Left Frame 001</h2>
        <div class="frame-test">
            <img src="left/ezgif-frame-001.jpg" onload="console.log('Left frame 001 loaded')" onerror="console.error('Left frame 001 failed')">
        </div>
    </div>
    
    <div class="test-container">
        <h2>Test Right Frame 002</h2>
        <div class="frame-test">
            <img src="right/ezgif-frame-002.jpg" onload="console.log('Right frame 002 loaded')" onerror="console.error('Right frame 002 failed')">
        </div>
    </div>
    
    <div class="test-container">
        <h2>Console Output</h2>
        <div id="console-output"></div>
    </div>

    <script>
        // Override console.log to display on page
        const originalLog = console.log;
        const originalError = console.error;
        const originalWarn = console.warn;
        
        function addToConsole(message, type = 'log') {
            const output = document.getElementById('console-output');
            const div = document.createElement('div');
            div.style.color = type === 'error' ? 'red' : type === 'warn' ? 'orange' : 'black';
            div.textContent = `[${type.toUpperCase()}] ${message}`;
            output.appendChild(div);
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };
        
        // Test frame loading
        console.log('Starting face frame test...');
        
        // Test if directories exist by trying to load a few frames
        const testFrames = [
            'left/ezgif-frame-001.jpg',
            'left/ezgif-frame-010.jpg',
            'left/ezgif-frame-038.jpg',
            'right/ezgif-frame-002.jpg',
            'right/ezgif-frame-025.jpg',
            'right/ezgif-frame-048.jpg'
        ];
        
        testFrames.forEach(frame => {
            const img = new Image();
            img.onload = () => console.log(`✅ ${frame} loaded successfully`);
            img.onerror = () => console.error(`❌ ${frame} failed to load`);
            img.src = frame;
        });
    </script>
</body>
</html>
