<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Blocked - WorkSpace AI Monitor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
        }
        
        .container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .url {
            background: rgba(255, 255, 255, 0.2);
            padding: 10px 15px;
            border-radius: 10px;
            margin: 20px 0;
            word-break: break-all;
            font-family: monospace;
        }
        
        .reason {
            font-size: 18px;
            margin: 20px 0;
            opacity: 0.9;
        }
        
        .suggestions {
            margin: 30px 0;
        }
        
        .suggestions h3 {
            margin-bottom: 15px;
            font-size: 20px;
        }
        
        .suggestion-links {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .suggestion-link {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        
        .suggestion-link:hover {
            background: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
        }
        
        .timer {
            font-size: 24px;
            margin: 20px 0;
            font-weight: bold;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        .close-tab {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
            transition: all 0.3s ease;
        }
        
        .close-tab:hover {
            background: #ee5a6f;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🚫</div>
        <h1>Site Blocked</h1>
        
        <div class="url" id="blockedUrl">
            Loading...
        </div>
        
        <div class="reason">
            This site has been blocked because it may be distracting during your focus session.
        </div>
        
        <div class="suggestions">
            <h3>Continue Your Productive Session</h3>
            <div class="suggestion-links">
                <a href="https://www.khanacademy.org" class="suggestion-link">
                    📚 Khan Academy
                </a>
                <a href="https://www.coursera.org" class="suggestion-link">
                    🎓 Coursera
                </a>
                <a href="https://github.com" class="suggestion-link">
                    💻 GitHub
                </a>
                <a href="https://stackoverflow.com" class="suggestion-link">
                    💡 Stack Overflow
                </a>
            </div>
        </div>
        
        <button class="close-tab" onclick="closeTab()">
            Close Tab
        </button>
        
        <div class="timer" id="timer">
            Redirecting in <span id="countdown">10</span> seconds...
        </div>
    </div>

    <script>
        // Get URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const blockedUrl = urlParams.get('url') || 'Unknown site';
        const reason = urlParams.get('reason') || 'Distracting content detected';
        
        // Display blocked URL
        document.getElementById('blockedUrl').textContent = blockedUrl;
        
        // Countdown timer
        let countdown = 10;
        const countdownElement = document.getElementById('countdown');
        
        const timer = setInterval(() => {
            countdown--;
            countdownElement.textContent = countdown;
            
            if (countdown <= 0) {
                clearInterval(timer);
                closeTab();
            }
        }, 1000);
        
        // Close tab function
        function closeTab() {
            window.close();
            // If window.close() doesn't work, try to redirect to a safe site
            setTimeout(() => {
                window.location.href = 'https://www.google.com';
            }, 1000);
        }
        
        // Log the blocking event
        console.log('🚫 Site blocked:', blockedUrl);
        console.log('📝 Reason:', reason);
    </script>
</body>
</html>
