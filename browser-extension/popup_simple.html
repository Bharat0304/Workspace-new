<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <style>
        body {
            width: 300px;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0f0f23 0%, #1a1a2e 100%);
            color: white;
            margin: 0;
        }
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        .title {
            font-size: 18px;
            font-weight: 600;
            color: #f59e0b;
            margin-bottom: 5px;
        }
        .status {
            font-size: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            text-align: center;
            margin-bottom: 15px;
        }
        .status.active {
            background: #10b981;
            color: white;
        }
        .status.inactive {
            background: #ef4444;
            color: white;
        }
        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }
        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn.primary {
            background: #6366f1;
            color: white;
        }
        .btn.primary:hover {
            background: #4f46e5;
        }
        .btn.danger {
            background: #ef4444;
            color: white;
        }
        .btn.danger:hover {
            background: #dc2626;
        }
        .stats {
            background: rgba(255,255,255,0.1);
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stat-label {
            opacity: 0.8;
        }
        .stat-value {
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">🎯 WorkSpace AI</div>
        <div id="sessionStatus" class="status inactive">Session Inactive</div>
    </div>
    
    <div class="controls">
        <button id="startBtn" class="btn primary">Start</button>
        <button id="stopBtn" class="btn danger" disabled>Stop</button>
    </div>
    
    <div class="stats">
        <div class="stat-item">
            <span class="stat-label">Sites Blocked:</span>
            <span id="blockedCount" class="stat-value">0</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Session Time:</span>
            <span id="sessionTime" class="stat-value">0:00</span>
        </div>
        <div class="stat-item">
            <span class="stat-label">Current Tab:</span>
            <span id="currentSite" class="stat-value">-</span>
        </div>
    </div>

    <script src="popup_simple.js"></script>
</body>
</html>
